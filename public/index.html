<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="app"></main>
        <h1>Echo</h1>
        <p>Virtual assistant.</p>
        <div id="chat-box"></div>

        <form id="chat-form">
            <input 
            id="message-input"
            type="text"
            placeholder="Send a message to Echo..."
            autocomplete="off"
        />
        <button type="submit">Send</button>
        <button type="reset" id="reset-chat">Reset chat</button>
    </form>
</main>

<script src="script.js"></script>

</body>
</html>
